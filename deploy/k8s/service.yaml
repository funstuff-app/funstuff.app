# DustyTrails Service
# Exposes the deployment internally via ClusterIP
apiVersion: v1
kind: Service
metadata:
  name: dustytrails
  namespace: dustytrails
  labels:
    app: dustytrails
spec:
  type: ClusterIP
  selector:
    app: dustytrails
  ports:
    - name: http
      port: 80
      targetPort: 8766
      protocol: TCP
