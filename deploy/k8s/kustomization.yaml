# Kustomize configuration for DustyTrails K8s deployment
# 
# Usage:
#   kubectl apply -k deploy/k8s/           # Deploy all resources
#   kubectl delete -k deploy/k8s/          # Remove all resources
#   kubectl kustomize deploy/k8s/          # Preview generated manifests

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dustytrails

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/name: dustytrails
  app.kubernetes.io/component: dashboard
  app.kubernetes.io/managed-by: kustomize
