# DustyTrails ConfigMap
# Environment configuration for the dashboard server
apiVersion: v1
kind: ConfigMap
metadata:
  name: dustytrails-config
  namespace: dustytrails
  labels:
    app: dustytrails
data:
  # Server configuration
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8766"
  DATA_MODE: "proxy"
  FETCH_INTERVAL: "60"
  
  # Data directory (matches PVC mount)
  MOBILEAIR_DATA_DIR: "/data"
