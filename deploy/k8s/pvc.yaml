# DustyTrails Persistent Volume Claim
# Storage for cached data, snapshots, and road graphs
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dustytrails-data
  namespace: dustytrails
  labels:
    app: dustytrails
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # 5GB should be plenty for cache + snapshots + road graphs
      storage: 5Gi
  # DigitalOcean block storage (adjust for your provider)
  storageClassName: do-block-storage
