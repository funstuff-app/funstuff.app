<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>DustyTrails BETA</title>
  
  <!-- PWA / Add to Dock -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111826" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DustyTrails" />
  <link rel="apple-touch-icon" href="/icon-180.png" />
  
  <link rel="stylesheet" href="/styles.css?v=20260202n" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <button id="menuBtn" class="menuBtn" type="button" title="Toggle sensor list" aria-label="Toggle menu">
        <span class="hamburger"></span>
      </button>
      <div class="brand">DustyTrails <span style="opacity:0.6;font-size:0.8em">BETA</span></div>
      <div class="status">
        <span id="statusText">Loading…</span>
        <span class="sep">•</span>
        <span id="lastUpdated">—</span>
      </div>
      <div class="controls">
        <!-- Hidden theme select (controlled via menu) -->
        <select id="mapTheme" aria-label="Map theme" style="display:none"></select>
        <!-- Hidden sliders (controlled via menu) -->
        <input id="mapDim" type="range" min="0" max="150" step="1" style="display:none" />
        <input id="mapSat" type="range" min="0" max="150" step="1" style="display:none" />
      </div>
      <!-- DVR menu in topbar -->
      <div class="pbMenuWrap topbarMenu">
        <button id="shareBtn" type="button" class="shareBtn" title="Share" aria-label="Share"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M8 7l4-4 4 4"/><path d="M5 11v9a2 2 0 002 2h10a2 2 0 002-2v-9"/></svg></button>
        <button id="pbMenuBtn" type="button" class="pbMenuBtn" title="More options">⋮</button>
        <div id="pbMenu" class="pbMenu hidden">
          <div class="pbMenuItem" data-action="save">
            <span class="pbMenuIcon">💾</span>
            <span class="pbMenuLabel">Save Snapshot</span>
          </div>
          <div class="pbMenuItem" data-action="load">
            <span class="pbMenuIcon">📂</span>
            <span class="pbMenuLabel">Load Snapshot</span>
          </div>
          <div class="pbMenuDivider"></div>
          <div class="pbMenuItem pbMenuSub" data-submenu="days">
            <span class="pbMenuArrow">‹</span>
            <span class="pbMenuIcon">📅</span>
            <span class="pbMenuLabel">Select Day</span>
            <div class="pbSubmenu" id="pbDaysSubmenu"></div>
          </div>
          <div class="pbMenuItem pbMenuSub" data-submenu="theme">
            <span class="pbMenuArrow">‹</span>
            <span class="pbMenuIcon">🎨</span>
            <span class="pbMenuLabel">Theme</span>
            <div class="pbSubmenu" id="pbThemeSubmenu"></div>
          </div>
          <div class="pbMenuItem pbMenuSub" data-submenu="display">
            <span class="pbMenuArrow">‹</span>
            <span class="pbMenuIcon">🖥️</span>
            <span class="pbMenuLabel">Display</span>
            <div class="pbSubmenu pbSubmenuSliders" id="pbDisplaySubmenu">
              <label class="pbSliderRow">
                <span>Dim</span>
                <input id="menuDim" type="range" min="0" max="150" step="1" />
              </label>
              <label class="pbSliderRow">
                <span>Sat</span>
                <input id="menuSat" type="range" min="0" max="150" step="1" />
              </label>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main id="layout">
      <section id="mapPane">
        <div id="mapRoot">
          <canvas id="tilesCanvas"></canvas>
          <canvas id="overlayCanvas"></canvas>

          <!-- Sidebar panel (integrated, overlays map) -->
          <aside id="sidebar" class="sidebarPanel">
            <div class="sidebarHeader">
              <span class="sidebarTitle">Sensors</span>
              <button id="sidebarClose" class="sidebarClose" type="button" title="Close" aria-label="Close sidebar">✕</button>
            </div>
            <div class="tabBar" role="tablist" aria-label="Sensor lists">
              <button id="tabMobile" class="tab active" role="tab" aria-selected="true" type="button">Mobile</button>
              <button id="tabPermanent" class="tab" role="tab" aria-selected="false" type="button">Permanent</button>
              <button id="tabLabels" class="tab mini active" role="button" type="button" title="Toggle marker labels">🏷️</button>
            </div>
            <div id="sensorListMobile" class="list" role="tabpanel" aria-labelledby="tabMobile"></div>
            <div id="sensorListFixed" class="list hidden" role="tabpanel" aria-labelledby="tabPermanent"></div>
          </aside>
        </div>

        <!-- Playback controls - OUTSIDE mapRoot to avoid canvas touch interference -->
        <div id="playbackBar" class="playbackBar" role="group" aria-label="Playback controls">
          <div class="pbRow1">
            <button id="pbPlay" type="button" title="Play/Pause">Live</button>
            <input id="pbScrub" type="range" min="0" max="1" value="0" step="1" aria-label="Scrub time" />
            <label class="pbSpeed" title="Playback speed">
              <span>Speed</span>
              <select id="pbSpeed" aria-label="Playback speed">
                <option value="1" selected>1×</option>
                <option value="5">5×</option>
                <option value="10">10×</option>
                <option value="20">20×</option>
              </select>
            </label>
          </div>
          <div class="pbRow2">
            <span id="pbLeft">—</span>
            <span class="sep">•</span>
            <span id="pbNow">—</span>
            <span class="sep">•</span>
            <span id="pbRight">—</span>
          </div>
        </div>
      </section>
    </main>
    
    <footer id="appFooter">
      <div class="footerContent">©2026 Funstuff.wtf <a href="mailto:matt@funstuff.app" class="contactLink">Contact Me</a></div>
    </footer>
  </div>

  <!-- Load order: nav engine → camera logic → config → projections → colors →
       aqi → format → data → MapView class → sidebar UI → main entry point -->
  <script src="map_nav_engine.js?v=20260205d"></script>
  <script src="camera_fit_logic.js?v=20260205d"></script>
  <script src="config.js?v=20260205d"></script>
  <script src="projections.js?v=20260205d"></script>
  <script src="colors.js?v=20260205d"></script>
  <script src="aqi.js?v=20260205d"></script>
  <script src="format_utils.js?v=20260205d"></script>
  <script src="data_utils.js?v=20260205d"></script>
  <script src="map_view.js?v=20260205d"></script>
  <script src="sidebar_ui.js?v=20260205d"></script>
  <script src="app.js?v=20260205d"></script>
</body>
</html>
