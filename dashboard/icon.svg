<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#111826"/>
  
  <!-- Single continuous teardrop pin -->
  <path d="M 256,330 L 176,215 A 90,90 0 1 1 336,215 Z" 
        fill="none" 
        stroke="#6cc3ff" 
        stroke-width="14"
        stroke-linejoin="round"/>
  <circle cx="256" cy="170" r="36" fill="#4ade80"/>
  
  <!-- Zigzag trail - 90 degree turns -->
  <path d="M 90,330 L 170,330 L 170,380 L 290,380 L 290,430 L 420,430" 
        fill="none" 
        stroke="#6cc3ff" 
        stroke-width="14" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  <circle cx="90" cy="330" r="16" fill="#4ade80"/>
  <circle cx="220" cy="380" r="16" fill="#facc15"/>
  <circle cx="420" cy="430" r="16" fill="#ef4444"/>
</svg>
